name: "VD — Outline Agent (Manual Trigger)"

on:
  workflow_dispatch:
    inputs:
      page_type:
        description: "Page Type"
        required: true
        type: choice
        options:
          - hub
          - cluster
          - school
      assigned_pillar:
        description: "Assigned Pillar (P1–P5)"
        required: true
        type: choice
        options:
          - P1
          - P2
          - P3
          - P4
          - P5
      entity_concept:
        description: "Primary Topic / Entity Concept (one specific sentence)"
        required: true
        type: string
      url_slug:
        description: "Target URL Slug (e.g., /gi-bill-hybrid-programs-california)"
        required: true
        type: string

jobs:
  outline-agent:
    name: "Run Outline Agent"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout outline branch"
        uses: actions/checkout@v4
        with:
          ref: outline
          fetch-depth: 1

      - name: "Create outline branch if missing"
        run: |
          if ! git show-ref --verify --quiet refs/heads/outline; then
            echo "Outline branch not found – creating from current branch"
            git checkout -b outline
            git push origin outline
          fi
          git checkout outline

      - name: "Verify master prompt file exists"
        run: |
          if [ ! -f "orchestration/master-prompt.md" ]; then
            echo "ERROR: orchestration/master-prompt.md not found on outline branch."
            exit 1
          fi
          echo "master-prompt.md confirmed present (size: $(wc -c < orchestration/master-prompt.md) bytes)"

      - name: "Call GitHub Models API and save output"
        env:
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          PAGE_TYPE: ${{ github.event.inputs.page_type }}
          ASSIGNED_PILLAR: ${{ github.event.inputs.assigned_pillar }}
          ENTITY_CONCEPT: ${{ github.event.inputs.entity_concept }}
          URL_SLUG: ${{ github.event.inputs.url_slug }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          # ---- Write header using shell (no YAML conflicts) ----
          cat > outline-output.md << 'EOF'
          ---
          # Outline Agent Output
          **Run:** 
          **Branch:** outline
          **Triggered by:** 
          **Page Type:** 
          **Assigned Pillar:** 
          **Entity Concept:** 
          **URL Slug:** 
          ---
          
          EOF
          
          # Replace placeholders with actual values (avoid any ${{ }} in YAML)
          sed -i "s|**Run:** |**Run:** $GITHUB_RUN_NUMBER|" outline-output.md
          sed -i "s|**Triggered by:** |**Triggered by:** $GITHUB_ACTOR|" outline-output.md
          sed -i "s|**Page Type:** |**Page Type:** $PAGE_TYPE|" outline-output.md
          sed -i "s|**Assigned Pillar:** |**Assigned Pillar:** $ASSIGNED_PILLAR|" outline-output.md
          sed -i "s|**Entity Concept:** |**Entity Concept:** $ENTITY_CONCEPT|" outline-output.md
          sed -i "s|**URL Slug:** |**URL Slug:** $URL_SLUG|" outline-output.md

          # ---- Python script for API call (no braces in YAML) ----
          pip install requests --quiet 2>/dev/null || true
          python3 << 'PYEOF'
          import json, os, sys, textwrap

          token = os.environ.get("GH_MODELS_TOKEN", "").strip()
          if not token:
              print("ERROR: GH_MODELS_TOKEN missing", file=sys.stderr)
              sys.exit(1)

          try:
              with open("orchestration/master-prompt.md", "r", encoding="utf-8") as f:
                  system_prompt = f.read()
          except FileNotFoundError:
              print("ERROR: orchestration/master-prompt.md not readable", file=sys.stderr)
              sys.exit(1)

          page_type = os.environ.get("PAGE_TYPE", "").strip()
          assigned_pillar = os.environ.get("ASSIGNED_PILLAR", "").strip()
          entity_concept = os.environ.get("ENTITY_CONCEPT", "").strip()
          url_slug = os.environ.get("URL_SLUG", "").strip()

          missing = [k for k, v in [("page_type", page_type), ("assigned_pillar", assigned_pillar),
                                     ("entity_concept", entity_concept), ("url_slug", url_slug)] if not v]
          if missing:
              print(f"ERROR: Missing inputs: {', '.join(missing)}", file=sys.stderr)
              sys.exit(1)

          user_message = textwrap.dedent(f"""\
              Page Type: {page_type}
              Assigned Pillar: {assigned_pillar}
              Primary Topic / Entity Concept: {entity_concept}
              Target URL Slug: {url_slug}

              Generate all 14 required deliverables per your system instructions.
          """)

          payload = {
              "model": "gpt-4o",
              "messages": [
                  {"role": "system", "content": system_prompt},
                  {"role": "user",   "content": user_message}
              ],
              "max_tokens": 4000,
              "temperature": 0.3
          }

          api_url = "https://models.inference.ai.azure.com/chat/completions?api-version=2024-04-01-preview"
          headers = {
              "Authorization": f"Bearer {token}",
              "Content-Type": "application/json"
          }

          try:
              import requests
              resp = requests.post(api_url, headers=headers, json=payload, timeout=120)
              if resp.status_code != 200:
                  print(f"HTTP {resp.status_code}: {resp.text}", file=sys.stderr)
                  sys.exit(1)
              data = resp.json()
          except ImportError:
              import urllib.request, urllib.error
              req = urllib.request.Request(api_url, data=json.dumps(payload).encode("utf-8"), headers=headers, method="POST")
              try:
                  with urllib.request.urlopen(req, timeout=120) as resp:
                      data = json.loads(resp.read().decode("utf-8"))
              except urllib.error.HTTPError as e:
                  error_body = e.read().decode("utf-8", errors="replace")
                  print(f"HTTP ERROR {e.code}: {error_body}", file=sys.stderr)
                  sys.exit(1)

          if "choices" not in data or not data["choices"]:
              print(f"UNEXPECTED API RESPONSE: {json.dumps(data, indent=2)}", file=sys.stderr)
              sys.exit(1)

          content = data["choices"][0]["message"]["content"]

          # Append model output to the existing file (header already there)
          with open("outline-output.md", "a", encoding="utf-8") as f:
              f.write(content)

          print(f"Success: output appended to outline-output.md")
          sys.exit(0)
          PYEOF

      - name: "Upload outline output as artifact"
        uses: actions/upload-artifact@v4
        with:
          name: "outline-output-run-${{ github.run_number }}"
          path: outline-output.md
          retention-days: 30

      - name: "Print output to workflow log"
        run: |
          echo "========== OUTLINE AGENT OUTPUT =========="
          cat outline-output.md
          echo "========== END OF OUTPUT =========="
